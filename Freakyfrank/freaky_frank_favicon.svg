<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0a"/>
  
  <!-- FA monogram logo - pixel-perfect recreation -->
  <!-- F left vertical -->
  <rect x="18" y="22" width="10" height="46" fill="#f0ede8"/>
  <!-- F top horizontal -->
  <rect x="18" y="22" width="32" height="10" fill="#f0ede8"/>
  <!-- F middle horizontal -->
  <rect x="18" y="42" width="24" height="8" fill="#f0ede8"/>
  
  <!-- A right vertical (tall) -->
  <rect x="62" y="22" width="10" height="46" fill="#f0ede8"/>
  <!-- A top horizontal (offset/overlapping with F top) -->
  <rect x="44" y="30" width="28" height="8" fill="#f0ede8"/>
  <!-- A crossbar -->
  <rect x="44" y="50" width="18" height="8" fill="#f0ede8"/>
</svg>
